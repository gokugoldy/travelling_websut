<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Wanderlamst</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="login.css">
</head>
<body class="login-page">
    <!-- Custom Cursor elements -->
    <div class="cursor"></div>
    <div class="cursor-follower"></div> 

    <!-- Navigation -->
    <nav class="navbar scrolled">
        <a href="index.html" class="logo" style="cursor: none;">Wander<span>lamst</span></a>
    </nav>

    <!-- Floating Background Elements -->
    <div class="circles">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <!-- Register Container -->
    <div class="login-container">
        <div class="login-card tilt-card">
            <div class="login-header">
                <i data-lucide="user-plus" class="login-icon"></i>
                <h2>Create Account</h2>
                <p>Join Wanderlust for exclusive travel experiences.</p>
            </div>
            <form class="login-form">
                <div class="input-group stagger-item">
                    <input type="text" id="register-name" required placeholder=" ">
                    <label for="register-name">Full Name</label>
                </div>
                <div class="input-group stagger-item">
                    <input type="email" id="register-email" required placeholder=" ">
                    <label for="register-email">Email Address</label>
                </div>
                <div class="input-group stagger-item">
                    <input type="password" id="register-password" required placeholder=" ">
                    <label for="register-password">Password</label>
                </div>
                <div class="input-group stagger-item">
                    <input type="password" id="register-confirm" required placeholder=" ">
                    <label for="register-confirm">Confirm Password</label>
                </div>
                <div class="login-options stagger-item">
                    <label class="remember">
                        <input type="checkbox" required> I agree to the <a href="#" style="color: var(--primary); margin-left: 5px;">Terms & Conditions</a>
                    </label>
                </div>
                <button type="submit" class="btn btn-primary submit-btn stagger-item" style="width: 100%;">Create Account</button>
            </form>
            <div class="login-footer stagger-item">
                <p>Already have an account? <a href="login.html">Log in</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="login.js"></script>
    <script>
      lucide.createIcons();
    </script>
</body>
</html>
