<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Wanderlamst</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="login.css">
</head>
<body class="login-page">
    <!-- Custom Cursor elements -->
    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <!-- Navigation -->
    <nav class="navbar scrolled">
        <a href="index.html" class="logo" style="cursor: none;">Wander<span>lamst</span></a>
    </nav>

    <!-- Floating Background Elements -->
    <div class="circles">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-card tilt-card">
            <div class="login-header">
                <i data-lucide="user-circle" class="login-icon"></i>
                <h2>Welcome Back</h2>
                <p>Log in to access your premium travel itinerary.</p>
            </div>
            <form class="login-form">
                <div class="input-group stagger-item">
                    <input type="email" id="login-email" required placeholder=" ">
                    <label for="login-email">Email Address</label>
                </div>
                <div class="input-group stagger-item">
                    <input type="password" id="login-password" required placeholder=" ">
                    <label for="login-password">Password</label>
                </div>
                <div class="login-options stagger-item">
                    <label class="remember">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary submit-btn stagger-item" style="width: 100%;">Log In</button>
            </form>
            <div class="login-footer stagger-item">
                <p>Don't have an account? <a href="register.html">Sign up</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="login.js"></script>
    <script>
      lucide.createIcons();
    </script>
</body>
</html>
